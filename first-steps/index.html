<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TachoMobile - First Steps</title>

  <script>
    const lang = (navigator.language || navigator.userLanguage).toLowerCase();

    if (lang.startsWith("pl")) {
      window.location.replace("/pl/guide/first-steps");
    } else if (lang.startsWith("de")) {
      window.location.replace("/de/guide/first-steps");
    } else if (lang.startsWith("hu")) {
      window.location.replace("/hu/guide/first-steps");
    } else if (lang.startsWith("cs")) {
      window.location.replace("/cs/guide/first-steps");
    } else if (lang.startsWith("es")) {
      window.location.replace("/es/guide/first-steps");
    } else if (lang.startsWith("fr")) {
      window.location.replace("/fr/guide/first-steps");
    } else if (lang.startsWith("it")) {
      window.location.replace("/it/guide/first-steps");
    } else if (lang.startsWith("lt")) {
      window.location.replace("/lt/guide/first-steps");
    } else if (lang.startsWith("pt")) {
      window.location.replace("/pt/guide/first-steps");
    } else if (lang.startsWith("ro")) {
      window.location.replace("/ro/guide/first-steps");
    } else if (lang.startsWith("ru")) {
      window.location.replace("/ru/guide/first-steps");
    } else if (lang.startsWith("sk")) {
      window.location.replace("/sk/guide/first-steps");
    } else if (lang.startsWith("tr")) {
      window.location.replace("/tr/guide/first-steps");
    } else if (lang.startsWith("uk")) {
      window.location.replace("/ua/guide/first-steps");
    } else {
      window.location.replace("/en/guide/first-steps");
    }
  </script>
</head>
<body>
</body>
</html>
