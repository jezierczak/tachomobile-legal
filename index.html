<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TachoMobile</title>

  <script>
    const lang = (navigator.language || navigator.userLanguage).toLowerCase();

    if (lang.startsWith("pl")) {
      window.location.replace("/pl/");
    } else if (lang.startsWith("de")) {
      window.location.replace("/de/");
    } else if (lang.startsWith("hu")) {
      window.location.replace("/hu/");
    } else if (lang.startsWith("cs")) {
      window.location.replace("/cs/");
    } else if (lang.startsWith("es")) {
      window.location.replace("/es/");
    } else if (lang.startsWith("fr")) {
      window.location.replace("/fr/");
    } else if (lang.startsWith("it")) {
      window.location.replace("/it/");
    } else if (lang.startsWith("lt")) {
      window.location.replace("/lt/");
    } else if (lang.startsWith("pt")) {
      window.location.replace("/pt/");
    } else if (lang.startsWith("ro")) {
      window.location.replace("/ro/");
    } else if (lang.startsWith("ru")) {
      window.location.replace("/ru/");
    } else if (lang.startsWith("sk")) {
      window.location.replace("/sk/");
    } else if (lang.startsWith("tr")) {
      window.location.replace("/tr/");
    } else if (lang.startsWith("uk")) {
      window.location.replace("/ua/");
    } else {
      window.location.replace("/en/");
    }
  </script>
</head>
<body>
</body>
</html>
