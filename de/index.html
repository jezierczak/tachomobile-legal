<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TachoMobile 2 - Intelligenter Tachographen-Assistent</title>

    <style>
        :root {
            --bg-dark: #0b0c10;       /* Głęboka czerń z UI aplikacji */
            --bg-card: #14151f;       /* Ciemne tło kart */
            --accent-purple: #7c3aed; /* Fiolet z przycisku WORKING */
            --accent-purple-hover: #6d28d9;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            padding: 0 20px;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
        }

        /* --- HERO SECTION --- */
        .hero {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 40px;
            padding: 80px 0;
        }

        @media (max-width: 768px) {
            .hero {
                flex-direction: column;
                text-align: center;
                padding: 40px 0;
            }
        }

        .hero-content {
            flex: 1;
        }

        .hero-logo {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .hero h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 15px;
            letter-spacing: -0.03em;
            background: linear-gradient(to right, #ffffff, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero .subtitle {
            font-size: 1.25rem;
            color: var(--text-muted);
            margin-bottom: 30px;
            max-width: 540px;
        }

        .play-button {
            display: inline-flex;
            align-items: center;
            background-color: var(--accent-purple);
            color: white;
            padding: 14px 32px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1.1rem;
            text-decoration: none;
            transition: all 0.2s ease;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.3);
        }

        .play-button:hover {
            background-color: var(--accent-purple-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(124, 58, 237, 0.4);
        }

        .hero-mockup {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }
